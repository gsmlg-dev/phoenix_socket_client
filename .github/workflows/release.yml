name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        required: true
        description: 'The version to publish'
        default: '0.8.0'
      git_ref:
        required: true
        description: 'The git revision of repo, branch, tag, or commit'
        default: 'main'

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  tests:
    name: Run tests (Elixir ${{ matrix.elixir }}, OTP ${{ matrix.otp }})
    runs-on: ubuntu-latest
    timeout-minutes: 20

    strategy:
      fail-fast: false
      matrix:
        include:
          - elixir: '1.18'
            otp: '28'

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.git_ref }}

      - name: Set up Elixir
        uses: erlef/setup-beam@v1
        with:
          otp-version: ${{ matrix.otp }}
          elixir-version: ${{ matrix.elixir }}

      - name: Restore dependencies cache
        uses: actions/cache@v4
        with:
          path: |
            deps
            _build
          key: ${{ runner.os }}-mix-${{ matrix.elixir }}-${{ matrix.otp }}-${{ hashFiles('**/mix.lock') }}
          restore-keys: |
            ${{ runner.os }}-mix-${{ matrix.elixir }}-${{ matrix.otp }}-
            ${{ runner.os }}-mix-

      - name: Install dependencies
        run: |
          mix local.hex --force
          mix local.rebar --force
          mix deps.get

      - name: Check source code format
        run: mix format --check-formatted

      - name: Remove compiled application files
        run: mix clean

      - name: Compile with warnings as errors
        run: mix compile --warnings-as-errors

      - name: Run tests
        run: mix test --exclude performance --max-cases 1 --timeout 120000

  release:
    name: Publish release to hex.pm
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [tests]

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.git_ref }}
          fetch-depth: 0

      - name: Set up Elixir
        uses: erlef/setup-beam@v1
        with:
          otp-version: 28
          elixir-version: 1.18

      - name: Install dependencies
        run: |
          mix local.hex --force
          mix local.rebar --force
          mix deps.get

      - name: Update package version
        run: |
          VERSION="${{ inputs.version }}"
          perl -0pi -e 's/\@version "[^"]+"/\@version "'$VERSION'"/' mix.exs
          perl -0pi -e 's/{:phoenix_socket_client, "~> [^"]+"}/{:phoenix_socket_client, "~> '$VERSION'"}/' README.md
          perl -0pi -e 's/documentation-v[0-9]+\.[0-9]+\.[0-9]+-blue/documentation-v'$VERSION'-blue/' README.md
          perl -0pi -e 's#hexdocs\.pm/phoenix_socket_client/[0-9]+\.[0-9]+\.[0-9]+#hexdocs.pm/phoenix_socket_client/'$VERSION'#' README.md

      - name: Build Hex package
        run: mix hex.build

      - name: Publish to hex.pm
        env:
          HEX_API_KEY: ${{ secrets.HEX_API_KEY }}
        run: mix hex.publish --yes

      - name: Commit release version
        run: |
          VERSION="${{ inputs.version }}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add mix.exs README.md
          git commit -m "chore(release): v$VERSION"
          git tag "$VERSION"
          git push origin HEAD:${{ inputs.git_ref }}
          git push origin "$VERSION"

      - name: Create GitHub release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ inputs.version }}"
          gh release create "$VERSION" ./*.tar --generate-notes --title "$VERSION"
